<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Realtime Chart</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #131722;
      overflow: hidden;
      font-family: Inter, "Segoe UI", sans-serif;
    }

    #chart-root {
      width: 100%;
      height: 100%;
      background: #131722;
    }
  </style>
</head>
<body>
  <div id="chart-root"></div>

  <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
  <script src="qrc:///qtwebchannel/qwebchannel.js"></script>
  <script>
    const MAX_CANDLES = 500;
    const BG = '#131722';
    const GRID = '#2a2f3a';
    const TEXT = '#9ca3af';
    const BULL = '#16c784';
    const BEAR = '#ea3943';

    const root = document.getElementById('chart-root');
    const chart = LightweightCharts.createChart(root, {
      layout: { background: { color: BG }, textColor: TEXT },
      grid: { vertLines: { color: GRID }, horzLines: { color: GRID } },
      rightPriceScale: { borderColor: GRID },
      timeScale: {
        borderColor: GRID,
        rightOffset: 5,
        barSpacing: 10,
        minBarSpacing: 3,
        fixLeftEdge: false,
        lockVisibleTimeRangeOnResize: true,
      },
      crosshair: {
        mode: LightweightCharts.CrosshairMode.Normal,
        vertLine: { color: '#6b7280', width: 1, style: 0 },
        horzLine: { color: '#6b7280', width: 1, style: 0 },
      },
      handleScroll: { mouseWheel: true, pressedMouseMove: true, horzTouchDrag: true, vertTouchDrag: true },
      handleScale: { axisPressedMouseMove: true, mouseWheel: true, pinch: true },
      autoSize: true,
    });

    const candleSeries = chart.addCandlestickSeries({
      upColor: BULL,
      downColor: BEAR,
      borderVisible: true,
      wickUpColor: BULL,
      wickDownColor: BEAR,
      borderUpColor: BULL,
      borderDownColor: BEAR,
      priceLineVisible: true,
      lastValueVisible: true,
    });

    const ema20Series = chart.addLineSeries({ color: '#4da3ff', lineWidth: 2, priceLineVisible: false, lastValueVisible: false });
    const ema50Series = chart.addLineSeries({ color: '#f0b90b', lineWidth: 2, priceLineVisible: false, lastValueVisible: false });

    const volumeSeries = chart.addHistogramSeries({
      priceFormat: { type: 'volume' },
      priceScaleId: '',
      scaleMargins: { top: 0.78, bottom: 0 },
      lastValueVisible: false,
      priceLineVisible: false,
    });

    chart.priceScale('').applyOptions({ scaleMargins: { top: 0.78, bottom: 0 } });

    let candleData = [];

    function ensureSorted(data) {
      data.sort((a, b) => a.time - b.time);
      return data;
    }

    function ema(data, period) {
      if (!data.length) return [];
      const alpha = 2 / (period + 1);
      const out = [];
      let current = data[0].close;
      for (const point of data) {
        current = point.close * alpha + current * (1 - alpha);
        out.push({ time: point.time, value: current });
      }
      return out;
    }

    function volumeFromCandles(data) {
      return data.map((c) => ({
        time: c.time,
        value: c.volume ?? 0,
        color: c.close >= c.open ? 'rgba(22,199,132,0.45)' : 'rgba(234,57,67,0.45)',
      }));
    }

    function clampData(data) {
      return data.length > MAX_CANDLES ? data.slice(data.length - MAX_CANDLES) : data;
    }

    function renderAll() {
      candleSeries.setData(candleData);
      ema20Series.setData(ema(candleData, 20));
      ema50Series.setData(ema(candleData, 50));
      volumeSeries.setData(volumeFromCandles(candleData));
      chart.timeScale().fitContent();
    }

    function upsertLatest(candle) {
      if (!candle || !Number.isFinite(candle.time)) return;

      const last = candleData[candleData.length - 1];
      if (!last) {
        candleData = [candle];
      } else if (candle.time === last.time) {
        candleData[candleData.length - 1] = candle;
      } else if (candle.time > last.time) {
        candleData.push(candle);
      } else {
        const idx = candleData.findIndex((item) => item.time === candle.time);
        if (idx >= 0) candleData[idx] = candle;
      }

      candleData = clampData(ensureSorted(candleData));
      candleSeries.update(candle);

      const e20 = ema(candleData, 20);
      const e50 = ema(candleData, 50);
      const vol = volumeFromCandles(candleData);
      if (e20.length) ema20Series.update(e20[e20.length - 1]);
      if (e50.length) ema50Series.update(e50[e50.length - 1]);
      if (vol.length) volumeSeries.update(vol[vol.length - 1]);
    }

    function applySnapshot(payload) {
      try {
        const parsed = JSON.parse(payload);
        if (!Array.isArray(parsed)) return;
        candleData = clampData(ensureSorted(parsed.filter((row) => Number.isFinite(row.time))));
        renderAll();
      } catch (_) {
        // no-op
      }
    }

    function applyUpdate(payload) {
      try {
        const candle = JSON.parse(payload);
        upsertLatest(candle);
      } catch (_) {
        // no-op
      }
    }

    new QWebChannel(qt.webChannelTransport, function(channel) {
      const bridge = channel.objects.chartBridge;
      bridge.fullSnapshot.connect(applySnapshot);
      bridge.candleUpdate.connect(applyUpdate);
      bridge.js_ready();
    });

    window.addEventListener('resize', () => chart.resize(root.clientWidth, root.clientHeight));
  </script>
</body>
</html>
