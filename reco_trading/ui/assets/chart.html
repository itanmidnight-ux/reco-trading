<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Reco Trading Chart</title>
  <style>
    html, body { margin: 0; padding: 0; background: #131722; color: #e6e8ee; height: 100%; overflow: hidden; }
    #chart { width: 100%; height: 100%; }
  </style>
  <script src="https://unpkg.com/lightweight-charts@4.2.1/dist/lightweight-charts.standalone.production.js"></script>
  <script src="qrc:///qtwebchannel/qwebchannel.js"></script>
</head>
<body>
  <div id="chart"></div>
  <script>
    const chart = LightweightCharts.createChart(document.getElementById('chart'), {
      layout: { background: { type: 'solid', color: '#131722' }, textColor: '#e6e8ee' },
      grid: { vertLines: { color: '#1f2633' }, horzLines: { color: '#1f2633' } },
      rightPriceScale: { borderColor: '#2a2f3a' },
      timeScale: { borderColor: '#2a2f3a', rightOffset: 12, timeVisible: true },
      crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
      handleScroll: true,
      handleScale: true,
      localization: { locale: 'en-US' },
    });

    const candleSeries = chart.addCandlestickSeries({
      upColor: '#16c784', downColor: '#ea3943', wickUpColor: '#16c784', wickDownColor: '#ea3943', borderVisible: false
    });
    const ema20Series = chart.addLineSeries({ color: '#4da3ff', lineWidth: 2, priceLineVisible: false });
    const ema50Series = chart.addLineSeries({ color: '#f0b90b', lineWidth: 2, priceLineVisible: false });
    const volumeSeries = chart.addHistogramSeries({
      color: '#3b82f6',
      priceFormat: { type: 'volume' },
      priceScaleId: ''
    });
    volumeSeries.priceScale().applyOptions({ scaleMargins: { top: 0.80, bottom: 0 } });

    function ema(candles, period) {
      if (!candles.length) return [];
      const alpha = 2 / (period + 1);
      const out = [];
      let prev = candles[0].close;
      for (const c of candles) {
        prev = (c.close * alpha) + (prev * (1 - alpha));
        out.push({ time: c.time, value: prev });
      }
      return out;
    }

    let candles = [];

    function renderAll() {
      candleSeries.setData(candles);
      ema20Series.setData(ema(candles, 20));
      ema50Series.setData(ema(candles, 50));
      volumeSeries.setData(candles.map((c) => ({
        time: c.time,
        value: c.volume,
        color: c.close >= c.open ? '#16c78488' : '#ea394388'
      })));
      chart.timeScale().fitContent();
    }

    function upsertLast(c) {
      if (!candles.length) {
        candles = [c];
      } else if (candles[candles.length - 1].time === c.time) {
        candles[candles.length - 1] = c;
      } else {
        candles.push(c);
      }
      candleSeries.update(c);
      ema20Series.setData(ema(candles, 20));
      ema50Series.setData(ema(candles, 50));
      volumeSeries.update({
        time: c.time,
        value: c.volume,
        color: c.close >= c.open ? '#16c78488' : '#ea394388'
      });
    }

    window.addEventListener('resize', () => {
      const root = document.getElementById('chart');
      chart.applyOptions({ width: root.clientWidth, height: root.clientHeight });
    });

    new QWebChannel(qt.webChannelTransport, (channel) => {
      const bridge = channel.objects.chartBridge;
      bridge.candleDataUpdated.connect((payload) => {
        try {
          const parsed = JSON.parse(payload);
          const mode = parsed.mode || 'set';
          const incoming = parsed.candles || [];
          if (!incoming.length) return;

          if (mode === 'set') {
            candles = incoming;
            renderAll();
            return;
          }

          for (const c of incoming) {
            upsertLast(c);
          }
        } catch (_err) {
          // silently ignore malformed payloads
        }
      });
    });
  </script>
</body>
</html>
