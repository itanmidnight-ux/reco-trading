<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>◈ Reco Trading — Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: linear-gradient(135deg, #080d18 0%, #1c2840 100%); font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace; display: flex; align-items: center; justify-content: center; min-height: 100vh; color: #e2e8f0; }
        .login-container { background: #0f1624; border: 1px solid #243045; border-radius: 12px; padding: 40px; width: 100%; max-width: 400px; box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3); }
        .login-header { text-align: center; margin-bottom: 30px; }
        .logo { font-size: 28px; font-weight: 700; color: #06b6d4; letter-spacing: 0.05em; margin-bottom: 10px; }
        .login-subtitle { color: #94a3b8; font-size: 13px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 12px; text-transform: uppercase; letter-spacing: 0.08em; color: #94a3b8; margin-bottom: 8px; }
        .form-group input { width: 100%; padding: 12px 16px; background: #161f30; border: 1px solid #243045; border-radius: 8px; color: #e2e8f0; font-family: inherit; font-size: 13px; }
        .login-btn { width: 100%; padding: 12px; background: linear-gradient(135deg, #06b6d4 0%, #3b82f6 100%); border: none; border-radius: 8px; color: #fff; font-weight: 700; font-size: 13px; text-transform: uppercase; letter-spacing: 0.08em; cursor: pointer; margin-top: 10px; }
        .error-message { background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.3); color: #f87171; padding: 12px; border-radius: 6px; margin-bottom: 20px; font-size: 12px; display: none; }
        .error-message.show { display: block; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <div class="logo">◈ RECO TRADING</div>
            <div class="login-subtitle">Automated Trading Dashboard</div>
        </div>
        <div class="error-message" id="errorMessage"></div>
        <form id="loginForm">
            <div class="form-group"><label>Username</label><input type="text" id="username" placeholder="admin" required></div>
            <div class="form-group"><label>Password</label><input type="password" id="password" placeholder="••••••••" required></div>
            <button type="submit" class="login-btn">Sign In</button>
        </form>
    </div>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('errorMessage');
            try {
                const response = await fetch('/api/auth/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username, password }) });
                const data = await response.json();
                if (data.success) { localStorage.setItem('auth_token', data.token); window.location.href = '/'; }
                else { errorDiv.textContent = data.error || 'Invalid credentials'; errorDiv.classList.add('show'); }
            } catch (error) { errorDiv.textContent = 'Connection error: ' + error.message; errorDiv.classList.add('show'); }
        });
    </script>
</body>
</html>
