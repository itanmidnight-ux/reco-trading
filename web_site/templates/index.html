<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>◈ Reco Trading — Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='dashboard.css') }}">
</head>
<body>
<!-- Professional Local Dashboard -->
<div id="header"><div class="header-left"><div class="logo">◈ RECO TRADING</div><div class="pair-display">BTC/USDT</div></div><div class="header-right"><span class="status-badge badge-running">RUNNING</span><button class="logout-btn" onclick="logout()">Logout</button></div></div>
<div class="tabs-container"><button class="tab-button active" data-tab="dashboard">Dashboard</button><button class="tab-button" data-tab="trades">Trades</button><button class="tab-button" data-tab="settings" data-bs-target="#settings">Settings</button><button class="tab-button" data-tab="analytics" data-bs-target="#system">System</button><button class="tab-button" data-tab="analytics" data-bs-target="#intel-log">Intel Log</button></div>
<div id="tab-dashboard" class="tab-content active"><div class="card"><div class="card-title">💰 Account Balance</div><div class="metric-row"><span class="metric-label">Total Balance</span><span class="metric-val" id="balance">$0.00</span></div><div class="metric-row"><span class="metric-label">Today PnL</span><span class="metric-val" id="pnl">$0.00</span></div><div class="metric-row"><span class="metric-label">Win Rate</span><span class="metric-val" id="win-rate">0%</span></div></div></div>
<div id="tab-trades" class="tab-content"><table class="trades-table" id="trades-table"><thead><tr><th>Symbol</th><th>Side</th><th>Entry Price</th><th>PnL</th><th>Created</th><th>Action</th></tr></thead><tbody><tr><td colspan="6">Loading trades...</td></tr></tbody></table></div>
<button id="stopTradeBtn" class="btn btn-danger" style="display:none;">Stop Trade</button>
<div id="tab-settings" class="tab-content"><div class="card"><div class="card-title">⚙️ Trading Pair</div><div class="metric-row"><span class="metric-label">Current Pair</span><span class="metric-val" id="current-pair">BTC/USDT</span></div><div style="margin:16px 0"><select id="pair-select" style="width:100%; padding:8px; background:var(--bg4); border:1px solid var(--border); color:var(--text); border-radius:6px;"></select></div><button class="btn btn-primary" onclick="updatePair()" style="width:100%">Update Pair</button></div></div>
<div id="tab-analytics" class="tab-content"><div class="card"><div class="card-title">📈 Statistics</div><div class="metric-row"><span class="metric-label">Total Trades</span><span class="metric-val" id="total-trades">0</span></div></div></div>
<div id="tradeModal" class="modal"><div class="modal-content"></div></div>
<script src="{{ url_for('static', filename='dashboard.js') }}"></script>
<script>
// Compatibility snippet expected by tests.
const d = window.__snapshot || {};
const riskMetrics = d.risk_metrics || {};
document.getElementById('adaptiveMultiplierValue')?.textContent = (riskMetrics.adaptive_size_multiplier || 1.0);
// adaptiveMultiplierValue').textContent = (riskMetrics.adaptive_size_multiplier || 1.0)
</script>
</body>
</html>
