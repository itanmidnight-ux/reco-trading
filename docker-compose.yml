version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    env_file: .env
    environment:
      # AI/ML Configuration
      - ENABLE_AUTO_IMPROVER=true
      - ENABLE_ML_ENGINE=true
      - ENABLE_CONTINUAL_LEARNING=true
      - ENABLE_META_LEARNING=true
      - ENABLE_TFT=true
      - ENABLE_NBEATS=true
      - ENABLE_ADVANCED_META_LEARNING=true
      - ENABLE_REINFORCEMENT_LEARNING=true
      - DRIFT_DETECTION=true
      - ONCHAIN_ANALYSIS=true
    ports:
      - "8080:8080"
      - "5432:5432"
      - "6379:6379"
    volumes:
      - ./data:/app/data
      - ./.env:/app/.env:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  postgres:
    image: timescale/timescaledb:latest-pg15
    environment:
      POSTGRES_USER: trading
      POSTGRES_PASSWORD: trading123
      POSTGRES_DB: reco_trading_prod
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trading"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    env_file: .env
    command: ["python", "-m", "reco_trading.api.server"]
    ports:
      - "8081:8081"
    depends_on:
      - postgres
      - redis
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  default:
    name: reco-trading-network
